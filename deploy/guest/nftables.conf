#!/usr/sbin/nft -f
#
# SecGit in-guest egress allowlist. This enforces the no-plaintext-egress invariant: the
# guest may reach ONLY the AMD Key Distribution Service (and an optional self-hosted key
# broker) outbound, and accept ONLY the service ingress. Everything else is dropped.
#
# WHY IN THE GUEST (not the host firewall): the host/operator is UNTRUSTED (docs/threat-model.md),
# so a host firewall is not a confidentiality boundary — the operator could remove it. This
# file is installed by deploy/guest/mkosi.finalize and thus baked into the MEASURED UKI, so
# any tampering changes the SEV-SNP launch measurement and fails attestation. That makes the
# egress policy part of what a verifier attests to, not a host courtesy.
#
# DEFENSE IN DEPTH, not the only layer:
#   - dependency layer: deny.toml + `xtask egress-check` ban ML/telemetry/cloud-attestation
#     crates, so there is no code path that phones home (claim 10);
#   - application layer: secgit-net pins outbound to the hardcoded AMD KDS URLs
#     (crates/secgit-attest/src/vcek.rs) and the configured KBS;
#   - this packet layer: coarse allow-443/deny-rest so even a bug cannot exfiltrate to an
#     arbitrary host/port/protocol in the clear.
#
# [VERIFY] KDS/KBS are allowlisted by PORT (443/tcp + DNS), not by IP: AMD does not publish a
# stable KDS address range, so hostname pinning necessarily lives at the application layer
# above. If your deployment fixes the KBS to a known IP, tighten the `oif` rules to that IP.

flush ruleset

table inet secgit {
    chain input {
        type filter hook input priority filter; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # Attestation/verification + git-over-PQC-TLS ingress (in-CVM terminated).
        tcp dport 8443 accept

        # Minimal ICMP for path MTU / diagnostics.
        ip protocol icmp icmp type { echo-request, destination-unreachable, time-exceeded } accept
        ip6 nexthdr ipv6-icmp accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy drop;

        oif "lo" accept
        ct state established,related accept

        # DNS resolution (needed to resolve kdsintf.amd.com / the KBS host).
        udp dport 53 accept
        tcp dport 53 accept

        # The ONLY permitted outbound application traffic: HTTPS to AMD KDS and the optional
        # self-hosted key broker. Hostname pinning is enforced in secgit-net above this layer.
        tcp dport 443 accept

        # Everything else — arbitrary ports, plaintext protocols, telemetry — is dropped.
    }
}
