# SecGit confidential-guest image build (mkosi) — the M7 assembly seam.
#
# WHY THIS EXISTS: the SEV-SNP launch measurement is a SHA-384 fold over the exact bytes
# the CVM boots: OVMF firmware + (for measured direct boot) the kernel, initrd, and kernel
# command line. To make `xtask snp-measure` predict the measurement of the REAL guest, the
# guest must be assembled reproducibly and its launch inputs pinned. This config produces a
# Unified Kernel Image (UKI) — kernel + initrd + cmdline fused into ONE PE binary — so a
# single measured artifact is what OVMF direct-boots and what sev-snp-measure hashes.
#
# STATUS: SCAFFOLDED + PINNED here; actually built/booted in M7 (see docs/packaging.md and
# docs/adr/0005-reproducible-builds.md). The SecGit binaries are layered in from the
# reproducible OCI build (deploy/Dockerfile) via mkosi.finalize; keep DEBIAN_SNAPSHOT and
# the kernel command line in lockstep with deploy/Dockerfile and deploy/snp-inputs.example.json.
#
# [VERIFY] Option names track a fast-moving tool — validate against the mkosi version you
# run (Format=uki, Bootable=, KernelCommandLine= are stable in recent mkosi).

[Distribution]
Distribution=debian
Release=bookworm
# Pin apt to a Debian snapshot so the guest rootfs is reproducible across time. This MUST
# match deploy/Dockerfile's DEBIAN_SNAPSHOT so the two builds stay in lockstep.
Mirror=https://snapshot.debian.org/archive/debian/20260615T000000Z/
# Build-time apt config injected into the package-manager sandbox (NOT baked into the image):
# it enables the `bookworm-backports` suite from the SAME pinned snapshot and pins the kernel
# to it, so we get a >= 6.7 kernel (CONFIG_TSM / CONFIG_SEV_GUEST) while staying reproducible.
# See deploy/guest/mkosi.pkgmngr/. [VERIFY] PackageManagerTrees= is stable in recent mkosi.
PackageManagerTrees=mkosi.pkgmngr

[Output]
# A disk image with a dm-verity-protected root partition PLUS a standalone UKI (kernel +
# initrd + cmdline fused into one signed PE). SplitArtifacts emits the UKI as a separate file
# so the launcher can measured-direct-boot it (`-kernel`) while the verity root/hash live on
# the attached disk. The verity roothash is embedded in the UKI's `.roothash` PE section (and
# thus folded into the launch measurement), so the kernel command line stays byte-stable.
Format=disk
SplitArtifacts=yes
Output=secgit-guest
# Deterministic output: honor a fixed build epoch (matches SOURCE_DATE_EPOCH elsewhere).
Environment=SOURCE_DATE_EPOCH=1700000000
# Reproducible packaging: fixed seed so image UUIDs/salts do not float between rebuilds.
Seed=00000000-0000-0000-0000-000000000000

[Content]
Bootable=yes
# The kernel command line is measurement-critical. Every byte here is folded into the
# SEV-SNP launch digest, so it MUST be byte-identical to `append` in
# deploy/snp-inputs.example.json and to the value the launcher passes with kernel-hashes=on.
# The root is a dm-verity volume: no `root=` device is named — systemd auto-discovers the
# root + verity partitions (Discoverable Partitions Spec) and reads the roothash from the
# UKI's `.roothash` section, so the cmdline stays byte-stable across rebuilds.
# [VERIFY] If your mkosi appends `roothash=<hex>` to the cmdline instead of using the UKI
# `.roothash` section, that per-build hash must then be mirrored into every lockstep site.
KernelCommandLine=console=ttyS0 systemd.verity=yes ro
# configfs-tsm (the provider-neutral attestation-report interface at
# /sys/kernel/config/tsm/report) requires a guest kernel >= 6.7 with CONFIG_TSM +
# CONFIG_SEV_GUEST. Debian bookworm's stock kernel is 6.1 and LACKS configfs-tsm, so we
# install `linux-image-cloud-amd64` from bookworm-backports (>= 6.7) via the apt pin in
# mkosi.pkgmngr/ (option (a)). Alternatives if backports ever lacks a suitable pin:
#   (b) point Release= at a newer Debian (trixie) snapshot whose main kernel is >= 6.7, or
#   (c) drop in a reproducibly-built custom kernel via mkosi.extra.
# [VERIFY] Confirm the resolved backports kernel exposes /sys/kernel/config/tsm/report on the
# target silicon; without it the guest cannot fetch an SNP report and the KEK never releases.
Packages=
    systemd
    systemd-boot
    linux-image-cloud-amd64
    ca-certificates
    git
    nftables
# SecGit's own binaries come from the reproducible OCI build, not from apt. mkosi.finalize
# imports target/release/secgit-{server,verify} out of the OCI rootfs export, installs the
# in-guest egress allowlist (nftables.conf), and enables the boot-time attestation-gated
# service unit (secgit.service) — all measured into the UKI.

[Validation]
# Sign the UKI (SecureBoot) and generate dm-verity for the root partition, giving a fully
# measured, tamper-evident root: the verity roothash is embedded in the signed UKI (and so is
# measured), and any tampering with the root disk fails verification at read time.
#
# Signing keys are supplied at BUILD TIME and are NEVER committed to the repo — pass them via
# `deploy/guest/build-guest.sh` (SECGIT_SB_KEY / SECGIT_SB_CERT -> mkosi --secure-boot-*).
# See docs/operations.md for the key-management story.
SecureBoot=yes
SignExpectedPcr=yes
Verity=hash
